# Spring Application
spring.application.name=CampusTutorHub-Backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Datasource Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db.ggrmrvtivoymctogmjxo.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:your-password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Security (Supabase JWT)
spring.security.oauth2.resourceserver.jwt.jws-algorithms=HS256

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Server Settings
server.port=8080
server.error.include-message=always

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.campustutorhub.backend=DEBUG

# Supabase Custom Config
supabase.jwt-secret=${SUPABASE_JWT_SECRET:YOUR_SUPABASE_JWT_SECRET}

# Application JWT secret (used by jwtTokenProvider)
# Resolves from environment `APP_JWT_SECRET`, then `LEGACY_JWT_SECRET`, then `SUPABASE_JWT_SECRET`, then a placeholder default.
app.jwt.secret=${APP_JWT_SECRET:${LEGACY_JWT_SECRET:${SUPABASE_JWT_SECRET:d8c2546e-8734-4d61-82a9-546088dd7003}}}

# JWT expiration in milliseconds (used by jwtTokenProvider)
# Override with environment variable `APP_JWT_EXPIRATION_MS` if needed.
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

# Legacy JWT secret (provided) - still used by older tokens
legacy.jwt-secret=${LEGACY_JWT_SECRET:jqZID1XpUhTGDLNbxB0ua4V/9o1n2Ljip1GAkarUULKy0bn/CRKPcBP5j261YFdNZ/700XXAdFPzUHX0jLGTbA==}

